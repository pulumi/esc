run: |
  esc env webhook new test-user/default/src deploy --url https://example.invalid/hook --filter created --filter updated
  esc env webhook ls test-user/default/src
  esc env webhook get test-user/default/src deploy
  esc env webhook edit test-user/default/src deploy --active=false
  esc env webhook get test-user/default/src deploy
  esc env webhook ping test-user/default/src deploy
  esc env webhook delivery ls test-user/default/src deploy --utc
  esc env webhook rm test-user/default/src deploy
  esc env webhook ls test-user/default/src
environments:
  test-user/default/src:
    yaml:
      values: {}

---
