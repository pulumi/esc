run: |
  esc env open
  esc env get
process:
  fs:
    proj/.esc.yaml: |
      environment: test-user/default/the-env
  cwd: proj/sub
environments:
  test-user/default/the-env:
    values:
      foo: bar

---
> esc env open
{
  "foo": "bar"
}
> esc env get
