run: |
  esc env init default/test
  esc env provider azure-login static default/test cid tid /subscriptions/sub && esc env get default/test --definition
  esc env provider azure-login static default/test cid tid /subscriptions/sub --client-secret shhh && esc env get default/test --definition

---
> esc env init default/test
Environment created: test-user/default/test
> esc env provider azure-login static default/test cid tid /subscriptions/sub
Provider updated.
> esc env get default/test --definition
values:
  azure:
    login:
      fn::open::azure-login:
        clientId: cid
        tenantId: tid
        subscriptionId: /subscriptions/sub
> esc env provider azure-login static default/test cid tid /subscriptions/sub --client-secret shhh
Provider updated.
> esc env get default/test --definition
values:
